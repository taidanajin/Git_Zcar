<style>
  .join-page-header {
    text-align: center;
    margin: 40px 0;
    position: relative;
  }
  
  .join-page-header h1 {
    font-family: 'Georgia', serif;
    font-size: 2.5em;
    color: var(--text-color);
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    margin-bottom: 10px;
  }
  
  .join-page-header::before {
    content: '♔';
    display: block;
    font-size: 48px;
    color: #D4AF37;
    text-shadow: 0 0 15px rgba(212, 175, 55, 0.8);
    margin-bottom: 10px;
  }
  
  .join-page-header p {
    font-style: italic;
    color: #D4AF37;
    font-size: 1.1em;
  }
  
  .join-btn {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 40px;
    margin: 15px;
    background: linear-gradient(145deg, #ffffff, #f5f5f5);
    border: 3px solid #000000;
    border-radius: 15px;
    text-decoration: none;
    color: #000000;
    transition: all 0.4s ease;
    min-width: 250px;
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
    position: relative;
    overflow: hidden;
  }
  
  [data-bs-theme="dark"] .join-btn {
    background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
    color: #D4AF37;
    border-color: #D4AF37;
  }
  
  .join-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
    transition: left 0.5s ease;
  }
  
  .join-btn:hover::before {
    left: 100%;
  }
  
  .join-btn:hover {
    background: linear-gradient(145deg, #ffffff, #fffef8);
    box-shadow: 0 0 30px rgba(212, 175, 55, 0.8), 0 12px 24px rgba(0, 0, 0, 0.3);
    transform: translateY(-5px) scale(1.05);
    border-color: #D4AF37;
  }
  
  [data-bs-theme="dark"] .join-btn:hover {
    background: linear-gradient(145deg, #3a3a3a, #2a2a2a);
    box-shadow: 0 0 30px rgba(212, 175, 55, 0.6), 0 12px 24px rgba(0, 0, 0, 0.5);
  }
  
  .join-btn img {
    margin-bottom: 15px;
    border-radius: 10px;
    transition: all 0.3s ease;
    filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
  }
  
  .join-btn:hover img {
    transform: scale(1.1) rotate(5deg);
    filter: drop-shadow(0 6px 12px rgba(212, 175, 55, 0.5));
  }
  
  .join-btn svg {
    margin-bottom: 15px;
    transition: all 0.3s ease;
    filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
  }
  
  .join-btn:hover svg {
    transform: scale(1.1) rotate(5deg);
    filter: drop-shadow(0 6px 12px rgba(212, 175, 55, 0.5));
  }
  
  .join-btn .h5 {
    font-family: 'Georgia', serif;
    font-weight: 600;
    margin: 0;
    position: relative;
    z-index: 1;
  }
  
  .buttons-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
    margin-top: 50px;
    margin-bottom: 50px;
  }
  
  .mafia-card-suits {
    text-align: center;
    font-size: 36px;
    color: #D4AF37;
    margin: 30px 0;
    letter-spacing: 20px;
    text-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
  }
</style>

<main class="form-signin w-100 m-auto">
