[pytest]
# Конфигурация pytest для проекта
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Игнорировать main.py и другие файлы приложения
testpaths = tests
norecursedirs = .git .venv __pycache__ instance static templates

# Не запускать main.py как тест
addopts = --ignore=main.py --ignore=run_debug.py --ignore=setup_telegram.py --ignore=sync_telegram.py --ignore=load_existing_messages.py --ignore=load_full_history.py
